<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Baseball Lens</title>
<link rel="icon" type="image/png" href="./icon.png">
<link rel="apple-touch-icon" href="./icon.png">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@400;600;700;800;900&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/main.css">
<script type="text/javascript">
    (function(c,l,a,r,i,t,y){
        c[a]=c[a]||function(){(c[a].q=c[a].q||[]).push(arguments)};
        t=l.createElement(r);t.async=1;t.src="https://www.clarity.ms/tag/"+i;
        y=l.getElementsByTagName(r)[0];y.parentNode.insertBefore(t,y);
    })(window, document, "clarity", "script", "wg700hxerj");
</script>
</head>
<body>

<header>
  <button class="logo home-logo" type="button" onclick="switchTab('standings')" aria-label="Go to Baseball Lens home">
    <div class="logo-icon">
      <img src="./icon.png" alt="Baseball Lens logo">
    </div>
    <div class="logo-lockup">
      <div class="logo-wordmark">BASEBALL <span>LENS</span></div>
    </div>
  </button>
  <div class="season-badge" id="seasonBadge">SEE THE GAME CLEARLY</div>
</header>

<div class="tabs" id="desktopTabs">
  <button class="tab-btn active" onclick="switchTab('standings')">PLAYOFF RACE</button>
  <button class="tab-btn" onclick="switchTab('topgames')">TOP GAMES</button>
  <button class="tab-btn" onclick="switchTab('rosters')">TEAMS</button>
  <button class="tab-btn" onclick="switchTab('mvp')">MVP TRACKER</button>
</div>

<main>
  <div id="tab-standings" class="tab-panel active">
    <div id="standingsContent"><div class="loading"><div class="spinner"></div><div class="loading-text">LOADING STANDINGS...</div></div></div>
  </div>

  <div id="tab-bracket" class="tab-panel">
    <div id="bracketContent"><div class="loading"><div class="spinner"></div><div class="loading-text">LOADING BRACKET...</div></div></div>
  </div>

  <div id="tab-schedule" class="tab-panel">
    <div id="scheduleContent"><div class="loading"><div class="spinner"></div><div class="loading-text">LOADING SCHEDULE...</div></div></div>
  </div>

  <div id="tab-topgames" class="tab-panel">
    <div id="topGamesBreadcrumb" style="display:none;align-items:center;gap:8px;padding:0 0 12px;cursor:pointer;color:#1a56db" onclick="switchTab('standings')">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
      <span id="topGamesBreadcrumbLabel" style="font-family:'Barlow Condensed';font-weight:700;font-size:13px;letter-spacing:.5px">PLAYOFF RACE</span>
    </div>
    <div id="topGamesContent" style="padding-bottom:8px"><div class="loading"><div class="spinner"></div><div class="loading-text">LOADING TOP GAMES...</div></div></div>
  </div>


  <div id="tab-mvp" class="tab-panel">
    <div id="mvpBreadcrumb" style="display:none;align-items:center;gap:8px;padding:0 0 12px;cursor:pointer;color:#1a56db" onclick="switchTab('topgames')">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
      <span style="font-family:'Barlow Condensed';font-weight:700;font-size:13px;letter-spacing:.5px">TOP GAMES</span>
    </div>
    <div id="mvpContent"><div class="loading"><div class="spinner"></div><div class="loading-text">LOADING MVP TRACKER...</div></div></div>
  </div>

  <div id="tab-rosters" class="tab-panel">
    <div class="teams-layout">
      <div class="team-selector-card">
        <div class="team-selector-header" id="teamSelectorHeader" onclick="toggleTeamSelector()" style="cursor:pointer;display:flex;align-items:center;justify-content:space-between">
          <span id="teamSelectorLabel">SELECT TEAM</span>
          <svg id="teamSelectorChevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="width:14px;height:14px;transition:transform .2s"><polyline points="6 9 12 15 18 9"/></svg>
        </div>
        <div class="team-selector-list" id="teamSelectorList">
          <div class="loading"><div class="spinner"></div><div class="loading-text">LOADING...</div></div>
        </div>
      </div>
      <div style="flex:1;min-width:0">
        <div id="rosterBreadcrumb" style="display:none;align-items:center;gap:8px;padding:8px 0 12px;cursor:pointer;color:#1a56db" onclick="switchTab('standings')">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
          <span style="font-family:'Barlow Condensed';font-weight:700;font-size:13px;letter-spacing:.5px">STANDINGS</span>
        </div>
        <div class="diamond-panel" id="diamondPanel">
          <div style="display:flex;align-items:center;justify-content:center;height:300px;color:var(--muted);font-family:'Barlow Condensed';letter-spacing:2px;font-size:14px">
            ← SELECT A TEAM TO VIEW DIAMOND
          </div>
        </div>
      </div>
    </div>
  </div>
  <div class="app-footer">
  <div id="update-disclaimer" style="font-size:11px;color:var(--muted);opacity:.6;margin-bottom:8px;letter-spacing:.5px"></div>
  <div>Feedback? Bugs? Suggestions? Email me!</div>
  <a href="mailto:perezzamoracarlos.20@gmail.com?subject=BaseballLens%20feedback" class="contact-btn">
    Contact
  </a>
</div>
</main>

<nav class="bottom-nav" id="bottomNav">
  <button class="bnav-btn active" onclick="switchTab('standings')" data-tab="standings">
    <svg viewBox="0 0 24 24" fill="currentColor" stroke="none"><polygon points="12,22 22,15 22,2 2,2 2,15"/></svg>
    <span>HOME</span>
  </button>
  <button class="bnav-btn" onclick="switchTab('topgames')" data-tab="topgames">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
    <span>TOP GAMES</span>
  </button>
  <button class="bnav-btn" onclick="switchTab('rosters')" data-tab="rosters">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
    <span>ROSTERS</span>
  </button>
  <button class="bnav-btn" onclick="switchTab('mvp')" data-tab="mvp">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"/><path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"/><path d="M4 22h16"/><path d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22"/><path d="M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22"/><path d="M18 2H6v7a6 6 0 0 0 12 0V2Z"/></svg>
    <span>MVP RACE</span>
  </button>
</nav>

<script src="js/app.js"></script>
</body>
</html>
