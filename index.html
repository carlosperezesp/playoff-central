<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MLB Playoff Central</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@400;600;700;800;900&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f4f6f9;
    --surface: #ffffff;
    --surface2: #eef1f6;
    --border: #dde2ea;
    --accent: #1a56db;
    --accent2: #e05a2b;
    --text: #111827;
    --muted: #6b7280;
    --win: #16a34a;
    --loss: #dc2626;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background: var(--bg); color: var(--text); font-family: 'Inter', system-ui, sans-serif; min-height: 100vh; font-size: 14px; line-height: 1.5; -webkit-font-smoothing: antialiased; }

  header {
    background: linear-gradient(135deg, #ffffff 0%, #f4f6f9 100%);
    border-bottom: 1px solid var(--border);
    box-shadow: 0 1px 8px rgba(0,0,0,.06);
    padding: 0 24px;
    position: sticky; top: 0; z-index: 100;
    display: flex; align-items: center; justify-content: space-between;
    height: 60px;
  }
  .logo { font-family: 'Bebas Neue'; font-size: 28px; letter-spacing: 3px; color: var(--accent); }
  .logo span { color: var(--text); }
  .season-badge {
    background: var(--accent); color: #fff; font-family: 'Barlow Condensed'; font-weight: 700;
    padding: 4px 12px; font-size: 13px; letter-spacing: 2px;
  }

  .tabs {
    display: flex; gap: 0; border-bottom: 1px solid var(--border);
    background: var(--surface); padding: 0 24px; overflow-x: auto;
  }
  .tab-btn {
    background: none; border: none; color: var(--muted); font-family: 'Inter';
    font-weight: 600; font-size: 13px; letter-spacing: .5px; padding: 16px 20px;
    cursor: pointer; border-bottom: 2px solid transparent; transition: all .2s; white-space: nowrap;
  }
  .tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }
  .tab-btn:hover:not(.active) { color: var(--text); }

  main { padding: 28px 24px; max-width: 1400px; margin: 0 auto; }
  .tab-panel { display: none; }
  .tab-panel.active { display: block; }

  .section-title {
    font-family: 'Bebas Neue'; font-size: 22px; letter-spacing: 3px;
    color: var(--accent); margin-bottom: 20px; display: flex; align-items: center; gap: 12px;
  }
  .section-title::after { content: ''; flex: 1; height: 1px; background: var(--border); }

  .standings-table { width: 100%; border-collapse: collapse; font-size: 14px; }
  .standings-table th {
    font-family: 'Barlow Condensed'; font-weight: 600; font-size: 11px; letter-spacing: 1.5px;
    color: var(--muted); padding: 8px 12px; text-align: left; border-bottom: 1px solid var(--border);
  }
  .standings-table th.num { text-align: right; }
  .standings-table td { padding: 10px 12px; border-bottom: 1px solid var(--border); vertical-align: middle; }
  .standings-table td.num { text-align: right; font-variant-numeric: tabular-nums; }
  .standings-table tr:hover td { background: var(--surface2); }

  .team-cell { display: flex; align-items: center; gap: 10px; }
  .team-logo-sm { width: 28px; height: 28px; object-fit: contain; }
  .pct { font-family: 'Barlow Condensed'; font-weight: 600; }

  .schedule-list { display: flex; flex-direction: column; gap: 8px; }
  .game-row {
    display: grid; grid-template-columns: 90px 1fr 60px 1fr 120px;
    align-items: center; gap: 12px;
    background: var(--surface); border: 1px solid var(--border);
    padding: 12px 16px; box-shadow: 0 1px 3px rgba(0,0,0,.04);
  }
  .game-date { font-family: 'Barlow Condensed'; font-size: 13px; color: var(--muted); }
  .game-team { display: flex; align-items: center; gap: 8px; }
  .game-team-logo { width: 24px; height: 24px; object-fit: contain; }
  .game-team-name { font-family: 'Barlow Condensed'; font-weight: 600; font-size: 15px; }
  .game-score { font-family: 'Bebas Neue'; font-size: 22px; text-align: center; }
  .game-info { font-size: 12px; color: var(--muted); text-align: right; }
  .game-status { font-family: 'Barlow Condensed'; font-size: 12px; letter-spacing: 1px; }
  .game-status.live { color: var(--win); animation: pulse 1.5s infinite; }
  .game-status.final { color: var(--muted); }
  .game-status.upcoming { color: var(--accent); }
  @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:.5; } }

  .loading { display: flex; align-items: center; justify-content: center; padding: 60px; flex-direction: column; gap: 16px; }
  .spinner { width: 32px; height: 32px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin .8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-text { font-family: 'Barlow Condensed'; color: var(--muted); letter-spacing: 2px; font-size: 14px; }

  .error-box { background: rgba(224,90,43,.1); border: 1px solid rgba(224,90,43,.3); padding: 20px; color: var(--loss); font-size: 14px; }

  .legend { display: flex; gap: 20px; margin-bottom: 16px; flex-wrap: wrap; }
  .legend-item { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--muted); }
  .legend-dot { width: 10px; height: 10px; }
  .legend-dot.div { background: var(--win); }
  .legend-dot.wc { background: var(--accent); }
  .legend-dot.out { background: var(--loss); opacity: .6; }

  .divisions-grid { display: flex; flex-wrap: wrap; gap: 20px; margin-bottom: 32px; }
  .divisions-grid .division-card { flex: 1 1 calc(50% - 10px); min-width: 280px; }
  @media (max-width: 768px) { .divisions-grid .division-card { flex: 1 1 100%; min-width: 0; } }
  .division-card { background: var(--surface); border: 1px solid var(--border); box-shadow: 0 1px 4px rgba(0,0,0,.05); overflow: hidden; }
  .division-header { background: var(--surface2); padding: 11px 16px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid var(--border); }
  .division-name { font-family: 'Bebas Neue'; font-size: 18px; letter-spacing: 2px; color: var(--text); }
  .division-league { font-family: 'Barlow Condensed'; font-size: 12px; letter-spacing: 1px; color: var(--muted); font-weight: 600; }
  .div-table { width: 100%; border-collapse: collapse; font-size: 14px; }
  .div-table th { font-family: 'Barlow Condensed'; font-weight: 600; font-size: 11px; letter-spacing: 1.5px; color: var(--muted); padding: 7px 12px; text-align: left; border-bottom: 1px solid var(--border); background: var(--surface); }
  .div-table th.r { text-align: right; }
  .div-table td { padding: 9px 12px; border-bottom: 1px solid var(--border); vertical-align: middle; }
  .div-table td.r { text-align: right; font-variant-numeric: tabular-nums; font-family: 'Barlow Condensed'; font-size: 14px; }
  .div-table tr:last-child td { border-bottom: none; }
  .div-table tr:hover td { background: var(--surface2); }
  .div-table tr.div-leader td { border-left: 3px solid var(--win); }
  .div-table tr.wc-spot td { border-left: 3px solid var(--accent); }
  .div-table tr.elim-row td { opacity: .4; }
  .games-rem { font-family: 'Barlow Condensed'; font-size: 12px; font-weight: 600; color: var(--muted); background: var(--surface2); padding: 1px 6px; border: 1px solid var(--border); }
  .badge-div { background: rgba(22,163,74,.1); color: var(--win); border: 1px solid rgba(22,163,74,.3); font-family: 'Barlow Condensed'; font-size: 11px; letter-spacing: 1px; font-weight: 700; padding: 2px 7px; }
  .badge-wc { background: rgba(26,86,219,.08); color: var(--accent); border: 1px solid rgba(26,86,219,.25); font-family: 'Barlow Condensed'; font-size: 11px; letter-spacing: 1px; font-weight: 700; padding: 2px 7px; }
  .gb-val { font-family: 'Barlow Condensed'; font-weight: 600; }
  .gb-leader { color: var(--win); font-weight: 700; }

  .tracker-section { background: var(--surface); border: 1px solid var(--border); box-shadow: 0 1px 4px rgba(0,0,0,.05); padding: 20px; margin-bottom: 28px; }
  .tracker-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; flex-wrap: wrap; gap: 10px; }
  .tracker-title { font-family: 'Bebas Neue'; font-size: 18px; letter-spacing: 2px; color: var(--text); }
  .tracker-controls { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
  .tracker-select { font-family: 'Barlow Condensed'; font-size: 13px; font-weight: 600; letter-spacing: 1px; background: var(--surface2); border: 1px solid var(--border); color: var(--text); padding: 5px 10px; cursor: pointer; }
  .tracker-date-label { font-family: 'Bebas Neue'; font-size: 20px; letter-spacing: 2px; color: var(--accent); min-width: 100px; text-align: right; }
  .tracker-slider { width: 100%; -webkit-appearance: none; appearance: none; height: 4px; background: var(--border); outline: none; cursor: pointer; margin: 10px 0; }
  .tracker-slider::-webkit-slider-thumb { -webkit-appearance: none; width: 16px; height: 16px; border-radius: 50%; background: var(--accent); cursor: pointer; box-shadow: 0 1px 4px rgba(0,0,0,.2); }
  .tracker-slider::-moz-range-thumb { width: 16px; height: 16px; border-radius: 50%; background: var(--accent); cursor: pointer; border: none; }
  .tracker-loading { font-family: 'Barlow Condensed'; color: var(--muted); font-size: 12px; letter-spacing: 1px; }
  #trackerCanvas { width: 100%; display: block; }
  .tracker-legend-row { display: flex; gap: 14px; flex-wrap: wrap; margin-top: 10px; }
  .tracker-legend-item { display: flex; align-items: center; gap: 5px; font-size: 11px; color: var(--muted); font-family: 'Barlow Condensed'; }
  .tracker-legend-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }

  .bracket-grid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 16px;
    margin-bottom: 32px;
  }
  .series-card {
    background: var(--surface); border: 1px solid var(--border);
    padding: 16px; position: relative; overflow: hidden;
    box-shadow: 0 1px 4px rgba(0,0,0,.05);
  }
  .series-card::before {
    content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px;
    background: var(--accent);
  }
  .series-round {
    font-family: 'Barlow Condensed'; font-size: 11px; letter-spacing: 2px;
    color: var(--muted); margin-bottom: 12px;
  }
  .series-matchup { display: flex; flex-direction: column; gap: 8px; }
  .series-team {
    display: flex; align-items: center; justify-content: space-between;
    padding: 8px 10px; background: var(--bg);
  }
  .series-team.winner { background: rgba(22,163,74,.06); border-left: 3px solid var(--win); }
  .series-team.eliminated { opacity: .5; border-left: 3px solid var(--loss); }
  .series-team-info { display: flex; align-items: center; gap: 10px; }
  .series-logo { width: 32px; height: 32px; object-fit: contain; }
  .series-name { font-family: 'Barlow Condensed'; font-weight: 700; font-size: 16px; }
  .series-record { font-size: 11px; color: var(--muted); }
  .series-wins { font-family: 'Bebas Neue'; font-size: 28px; color: var(--text); }
  .series-wins.w { color: var(--win); }

  @media (max-width: 768px) {
    /* Header */
    header { padding: 0 12px; height: 52px; }
    .logo { font-size: 22px; letter-spacing: 2px; }
    .season-badge { font-size: 11px; padding: 3px 8px; letter-spacing: 1px; }

    /* Tabs */
    .tabs { padding: 0 8px; }
    .tab-btn { padding: 12px 12px; font-size: 12px; }

    /* Main */
    main { padding: 16px 12px; }
    .section-title { font-size: 18px; }

    /* Standings / division tables */
    .div-table { font-size: 13px; }
    .div-table th, .div-table td { padding: 7px 8px; }
    .standings-table { font-size: 13px; }
    .standings-table th, .standings-table td { padding: 7px 8px; }
    .team-cell { gap: 6px; }
    .team-logo-sm { width: 22px; height: 22px; }

    /* Schedule rows — stack into 2-line layout */
    .game-row {
      grid-template-columns: 1fr 1fr;
      grid-template-rows: auto auto auto;
      gap: 6px 8px;
      padding: 10px 12px;
      font-size: 13px;
    }
    .game-date   { grid-column: 1 / 2; grid-row: 1; align-self: center; }
    .game-info   { grid-column: 2 / 3; grid-row: 1; text-align: right; align-self: center; }
    .game-team:first-of-type { grid-column: 1 / 2; grid-row: 2; }
    .game-score  { grid-column: 2 / 3; grid-row: 2; font-size: 18px; text-align: right; }
    .game-team:last-of-type  { grid-column: 1 / 2; grid-row: 3; }
    .game-status { grid-column: 2 / 3; grid-row: 3; text-align: right; align-self: center; }
    .game-team-name { font-size: 14px; }

    /* Bracket cards */
    .bracket-grid { grid-template-columns: 1fr; }
    .series-name { font-size: 14px; }
    .series-wins { font-size: 22px; }

    /* Tracker */
    .tracker-section { padding: 14px 12px; }
    .tracker-header { gap: 8px; }
    .tracker-controls { gap: 8px; }
    .tracker-date-label { font-size: 17px; min-width: 80px; }

    /* Teams / roster panel */
    .team-selector-list { max-height: 220px; }
    .diamond-panel { padding: 14px 12px; }
    .dfield-container { height: 360px; }
    .dfield-circle { width: 36px; height: 36px; font-size: 10px; }
    .dfield-btn.active .dfield-circle,
    .dfield-btn-inline.active .dfield-circle { width: 42px; height: 42px; }
    .dfield-pill { font-size: 11px; max-width: 88px; }
    .impact-row { grid-template-columns: 1fr 70px 48px; gap: 7px; }
    .il-row { grid-template-columns: 1fr 70px 48px; gap: 7px; }
    .impact-stats-line { font-size: 11px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .impact-name { font-size: 13px; }
    .impact-name > * { flex-shrink: 0; }
    .impact-bar-val { font-size: 14px; }
    .dp-team-name { font-size: 22px; }

    /* Legend */
    .legend { gap: 12px; }
  }

  .teams-layout { display: grid; grid-template-columns: 280px 1fr; gap: 24px; align-items: start; }
  @media (max-width: 960px) { .teams-layout { grid-template-columns: 1fr; } }

  .team-selector-card {
    background: var(--surface); border: 1px solid var(--border);
    box-shadow: 0 1px 4px rgba(0,0,0,.05); overflow: hidden; border-radius: 8px;
  }
  .team-selector-header {
    background: var(--surface2); padding: 11px 14px; border-bottom: 1px solid var(--border);
    font-family: 'Inter'; font-weight: 700; font-size: 11px; letter-spacing: 1px;
    color: var(--muted); text-transform: uppercase;
  }
  .team-selector-list { max-height: 540px; overflow-y: auto; }
  .team-selector-item {
    display: flex; align-items: center; gap: 10px; padding: 8px 14px;
    cursor: pointer; border-bottom: 1px solid var(--border); transition: background .12s;
  }
  .team-selector-item:hover { background: var(--surface2); }
  .team-selector-item.active { background: rgba(26,86,219,.07); border-left: 3px solid var(--accent); }
  .team-selector-item img { width: 24px; height: 24px; object-fit: contain; flex-shrink: 0; }
  .team-selector-name { font-weight: 600; font-size: 14px; color: var(--text); }
  .team-selector-abbr { font-size: 11px; color: var(--muted); margin-left: auto; letter-spacing: .5px; }
  .team-selector-wl { font-family: 'Barlow Condensed'; font-size: 12px; font-weight: 700; color: var(--muted); margin-left: auto; letter-spacing: .5px; }
  .team-div-group {}
  .team-div-label {
    font-family: 'Barlow Condensed'; font-size: 10px; font-weight: 700; letter-spacing: 1.5px;
    text-transform: uppercase; color: var(--accent); padding: 7px 14px 4px;
    background: var(--surface2); border-bottom: 1px solid var(--border);
    position: sticky; top: 0; z-index: 1;
  }
  .team-div-pos {
    font-family: 'Barlow Condensed'; font-size: 12px; font-weight: 700; color: var(--muted);
    width: 14px; text-align: center; flex-shrink: 0;
  }

  /* Badges — LHB gets blue like LHP */
  .hand-badge { font-size: 10px; font-weight: 700; padding: 1px 5px; border-radius: 4px;
    background: rgba(184,15,33,.1); color: #b80f21; letter-spacing: .3px; }
  .hand-badge.lhp, .hand-badge.lhb { background: rgba(0,90,156,.1); color: #005A9C; }
  .hand-badge.swi { background: rgba(107,114,128,.12); color: var(--muted); }

  /* Secondary positions pill */
  .sec-pos-badge {
    font-size: 9px; font-weight: 700; padding: 1px 4px; border-radius: 3px;
    background: rgba(26,86,219,.07); color: var(--accent); border: 1px solid rgba(26,86,219,.2);
    letter-spacing: .3px; white-space: nowrap;
  }

  .diamond-panel {
    background: var(--surface); border: 1px solid var(--border);
    box-shadow: 0 1px 4px rgba(0,0,0,.05); padding: 20px;
    min-height: 420px; border-radius: 8px;
  }
  .diamond-panel-header {
    display: flex; align-items: center; gap: 14px; margin-bottom: 20px;
    padding-bottom: 16px; border-bottom: 1px solid var(--border);
  }
  .dp-logo { width: 48px; height: 48px; object-fit: contain; }
  .dp-team-name { font-family: 'Bebas Neue'; font-size: 26px; letter-spacing: 2px; line-height: 1; }
  .dp-subtitle { font-size: 11px; color: var(--muted); font-weight: 500; letter-spacing: .5px; margin-top: 3px; }

  .diamond-box {
    background: #eef2f9; border: 1px solid #dde5f0; border-radius: 12px;
    padding: 14px 14px 18px; margin-bottom: 4px;
  }
  .diamond-section-label {
    font-size: 10px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase;
    color: var(--muted); margin-bottom: 12px;
  }

  .dfield-container { position: relative; height: 440px; width: 100%; }

  .dfield-rombo {
    position: absolute; left: 50%; top: 58%;
    width: 200px; height: 200px;
    transform: translate(-50%, -50%) rotate(45deg);
    border: 2.5px solid rgba(100,120,200,.2); border-radius: 10px;
    pointer-events: none;
  }
  .dfield-homeplate {
    position: absolute; left: 50%; top: 78%;
    width: 8px; height: 8px; transform: translate(-50%, -50%);
    border-radius: 50%; background: rgba(26,86,219,.4); pointer-events: none;
  }

  .dfield-btn {
    position: absolute; transform: translate(-50%, -50%);
    display: flex; flex-direction: column; align-items: center; gap: 5px;
    background: transparent; border: none; padding: 0; cursor: pointer; z-index: 2;
  }
  .dfield-btn-inline {
    display: inline-flex; flex-direction: column; align-items: center; gap: 5px;
    background: transparent; border: none; padding: 0; cursor: pointer; min-width: 64px;
  }

  .dfield-circle {
    width: 42px; height: 42px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Inter'; font-weight: 800; font-size: 11px; color: #fff;
    border: 2.5px solid rgba(255,255,255,.8);
    box-shadow: 0 4px 12px rgba(22,28,39,.15);
    transition: all .18s ease;
  }
  .dfield-btn.active .dfield-circle, .dfield-btn-inline.active .dfield-circle {
    width: 48px; height: 48px;
    border: 3px solid rgba(255,255,255,.95);
    box-shadow: 0 8px 20px rgba(0,66,117,.22);
  }
  .dfield-pill {
    font-size: 12px; font-weight: 600; color: var(--text);
    background: rgba(241,243,255,.9);
    padding: 2px 8px; border-radius: 999px;
    border: 1px solid rgba(200,210,240,.7);
    white-space: nowrap; max-width: 110px;
    overflow: hidden; text-overflow: ellipsis;
  }
  .dfield-btn.active .dfield-pill, .dfield-btn-inline.active .dfield-pill {
    font-weight: 700; border-color: var(--btn-color, var(--accent));
  }

  /* Impact rows (player detail cards) */
  .impact-detail-card {
    background: #f8f9fd; border: 1px solid #e4eaf5; border-radius: 10px; padding: 10px 12px;
  }
  .impact-row {
    display: grid; grid-template-columns: 1fr minmax(80px,140px) 56px;
    gap: 10px; align-items: center; padding: 8px 0;
    border-bottom: 1px solid rgba(0,0,0,.05);
  }
  .impact-row:last-child { border-bottom: none; }
  .impact-row-left { display: flex; align-items: center; gap: 9px; min-width: 0; }
  .impact-photo {
    width: 32px; height: 32px; border-radius: 50%; object-fit: cover;
    border: 1.5px solid var(--border); flex-shrink: 0; background: var(--surface2);
  }
  .impact-name-block { min-width: 0; }
  .impact-name {
    font-weight: 700; font-size: 14px; color: var(--text);
    display: flex; align-items: center; gap: 5px; flex-wrap: wrap; line-height: 1.3;
  }
  .impact-stats-line { font-size: 13px; color: var(--muted); margin-top: 3px; font-weight: 500; letter-spacing: .1px; }
  .impact-bar-block { height: 7px; background: var(--border); border-radius: 999px; overflow: hidden; }
  .impact-bar-bg { width:100%; height:100%; border-radius: 999px; overflow:hidden; }
  .impact-bar-fill { height: 100%; border-radius: 999px; transition: width .35s ease; }
  .impact-bar-val-wrap { text-align: right; }
  .impact-bar-label { font-size: 9px; font-weight: 700; color: var(--muted); letter-spacing: .5px; text-transform: uppercase; display: block; }
  .impact-bar-val { font-family: 'Barlow Condensed'; font-weight: 800; font-size: 16px; line-height: 1; }

  /* Badges */
  .rookie-badge {
    font-size: 9px; font-weight: 800; padding: 1px 5px; border-radius: 4px;
    background: rgba(234,179,8,.15); color: #b45309; letter-spacing: .5px;
  }
  /* Award pip on circle — tiny emoji badge */
  .award-pip {
    position: absolute; width: 14px; height: 14px; border-radius: 50%;
    background: #fff; border: 1.5px solid #fff;
    display: flex; align-items: center; justify-content: center;
    font-size: 8px; line-height: 1; box-shadow: 0 1px 3px rgba(0,0,0,.25);
  }
  /* Award inline badge in player name row */
  .award-inline-badge {
    font-size: 11px; line-height: 1; cursor: default;

    font-size: 9px; font-weight: 800; padding: 1px 5px; border-radius: 4px;

  .alts-section-title {
    font-size: 10px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase;

  /* Pitcher groups */
  .pitcher-area { margin-top: 16px; border-top: 1px solid var(--border); padding-top: 14px; }

    font-size: 10px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase;

  .pitcher-group-wrap { padding: 10px 0; border-top: 1px solid var(--border); }
  .pitcher-group-wrap:first-child { border-top: none; padding-top: 0; }
  .pitcher-group-label {
    font-size: 11px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase;

  }
  .pitcher-circles-row { display: flex; gap: 10px; flex-wrap: wrap; }
  .pitcher-detail-card {
    margin-top: 10px; background: #f8f9fd;
    border: 1px solid #e4eaf5; border-radius: 10px; padding: 10px 12px;
  }

  /* ── Team Stats vs League ── */
  .team-stats-panel {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 10px; padding: 14px 16px; margin-bottom: 16px;
    box-shadow: 0 1px 4px rgba(0,0,0,.05);
  }
  .team-stats-title {
    font-size: 10px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase;
    color: var(--muted); margin-bottom: 12px;
  }
  .team-stats-grid {
    display: grid; grid-template-columns: 1fr 1fr; gap: 10px 20px;
  }
  .team-stat-row { display: flex; flex-direction: column; gap: 4px; }
  .team-stat-header {
    display: flex; align-items: baseline; justify-content: space-between; gap: 6px;
  }
  .team-stat-label {
    font-size: 10px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; color: var(--muted);
  }
  .team-stat-val {
    font-family: 'Barlow Condensed'; font-weight: 800; font-size: 17px; line-height: 1;
  }
  .team-stat-rank {
    font-family: 'Barlow Condensed'; font-size: 11px; font-weight: 700; letter-spacing: .5px;
    padding: 1px 5px; border-radius: 3px; white-space: nowrap;
  }
  .team-stat-rank.top { background: rgba(22,163,74,.12); color: var(--win); }
  .team-stat-rank.mid { background: rgba(234,179,8,.12); color: #b45309; }
  .team-stat-rank.bot { background: rgba(220,38,38,.10); color: var(--loss); }
  .team-stat-bar-wrap { position: relative; height: 5px; background: var(--border); border-radius: 999px; overflow: visible; }
  .team-stat-bar-fill { height: 100%; border-radius: 999px; transition: width .4s ease; }
  .team-stat-bar-dots {
    position: absolute; top: 50%; transform: translateY(-50%);
    display: flex; justify-content: space-between; width: 100%; pointer-events: none;
  }
  .innings-split-row { grid-column: 1 / -1; }
  .innings-split-title {
    font-size: 10px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase;
    color: var(--muted); margin-bottom: 6px;

  .innings-bar-wrap {
    height: 20px; border-radius: 4px; overflow: hidden; display: flex;

  .innings-legend { display: flex; gap: 14px; margin-top: 5px; }
  .innings-legend-item {

  /* ── Player trend indicator ── */

    display: inline-flex; align-items: center; gap: 3px;
    font-size: 9px; font-weight: 800; padding: 1px 5px; border-radius: 4px;
    letter-spacing: .3px; white-space: nowrap; vertical-align: middle;
  }
  .trend-up-strong { background: rgba(22,163,74,.15);  color: var(--win); }
  .trend-up        { background: rgba(26,86,219,.12);  color: var(--accent); }
  .trend-flat      { background: rgba(107,114,128,.1); color: var(--muted); }
  .trend-down      { background: rgba(220,38,38,.10);  color: var(--loss); }
  .trend-down-strong { background: rgba(220,38,38,.18); color: var(--loss); }
  .trend-badge svg { flex-shrink: 0; }

  /* IL section */
  .il-section { margin-top: 20px; border-top: 2px solid rgba(220,38,38,.15); padding-top: 16px; }
  .il-section-title {
    font-size: 11px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase;
    color: var(--loss); margin-bottom: 14px; display: flex; align-items: center; gap: 6px;
  }

  .il-group-label {
    font-size: 10px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase;

    border-bottom: 1px solid var(--border);

  .il-row {
    display: grid; grid-template-columns: 1fr minmax(80px,140px) 56px;
    gap: 10px; align-items: center; padding: 7px 0;
    border-bottom: 1px solid rgba(0,0,0,.04);
  }
  .il-row:last-child { border-bottom: none; }
</style>
</head>
<body>

<header>
  <div class="logo">MLB <span>PLAYOFF</span> CENTRAL</div>
  <div class="season-badge" id="seasonBadge">2026 SEASON</div>
</header>

<div class="tabs">
  <button class="tab-btn active" onclick="switchTab('standings')">PLAYOFF RACE</button>
  <button class="tab-btn" onclick="switchTab('bracket')">BRACKET</button>
  <button class="tab-btn" onclick="switchTab('topgames')">TOP GAMES</button>
  <button class="tab-btn" onclick="switchTab('rosters')">TEAMS</button>
</div>

<main>
  <div id="tab-standings" class="tab-panel active">
    <div id="standingsContent"><div class="loading"><div class="spinner"></div><div class="loading-text">LOADING STANDINGS...</div></div></div>
  </div>

  <div id="tab-bracket" class="tab-panel">
    <div id="bracketContent"><div class="loading"><div class="spinner"></div><div class="loading-text">LOADING BRACKET...</div></div></div>
  </div>

  <div id="tab-schedule" class="tab-panel">
    <div id="scheduleContent"><div class="loading"><div class="spinner"></div><div class="loading-text">LOADING SCHEDULE...</div></div></div>
  </div>

  <div id="tab-topgames" class="tab-panel">
    <div id="topGamesContent"><div class="loading"><div class="spinner"></div><div class="loading-text">LOADING TOP GAMES...</div></div></div>
  </div>

  <div id="tab-rosters" class="tab-panel">
    <div class="teams-layout">
      <div class="team-selector-card">
        <div class="team-selector-header">SELECT TEAM</div>
        <div class="team-selector-list" id="teamSelectorList">
          <div class="loading"><div class="spinner"></div><div class="loading-text">LOADING...</div></div>
        </div>
      </div>
      <div class="diamond-panel" id="diamondPanel">
        <div style="display:flex;align-items:center;justify-content:center;height:300px;color:var(--muted);font-family:'Barlow Condensed';letter-spacing:2px;font-size:14px">
          ← SELECT A TEAM TO VIEW DIAMOND
        </div>
      </div>
    </div>
  </div>
</main>

<script>
const MLB_API = 'https://statsapi.mlb.com/api/v1';
const CURRENT_YEAR = new Date().getFullYear();

const TEAM_META = {
  108: { name: 'Angels',      abbr: 'LAA', color: '#BA0021', logo: 'https://www.mlbstatic.com/team-logos/108.svg' },
  109: { name: 'Diamondbacks',abbr: 'ARI', color: '#A71930', logo: 'https://www.mlbstatic.com/team-logos/109.svg' },
  110: { name: 'Orioles',     abbr: 'BAL', color: '#DF4601', logo: 'https://www.mlbstatic.com/team-logos/110.svg' },
  111: { name: 'Red Sox',     abbr: 'BOS', color: '#BD3039', logo: 'https://www.mlbstatic.com/team-logos/111.svg' },
  112: { name: 'Cubs',        abbr: 'CHC', color: '#0E3386', logo: 'https://www.mlbstatic.com/team-logos/112.svg' },
  113: { name: 'Reds',        abbr: 'CIN', color: '#C6011F', logo: 'https://www.mlbstatic.com/team-logos/113.svg' },
  114: { name: 'Guardians',   abbr: 'CLE', color: '#00385D', logo: 'https://www.mlbstatic.com/team-logos/114.svg' },
  115: { name: 'Rockies',     abbr: 'COL', color: '#33006F', logo: 'https://www.mlbstatic.com/team-logos/115.svg' },
  116: { name: 'Tigers',      abbr: 'DET', color: '#0C2340', logo: 'https://www.mlbstatic.com/team-logos/116.svg' },
  117: { name: 'Astros',      abbr: 'HOU', color: '#002D62', logo: 'https://www.mlbstatic.com/team-logos/117.svg' },
  118: { name: 'Royals',      abbr: 'KC',  color: '#004687', logo: 'https://www.mlbstatic.com/team-logos/118.svg' },
  119: { name: 'Dodgers',     abbr: 'LAD', color: '#005A9C', logo: 'https://www.mlbstatic.com/team-logos/119.svg' },
  120: { name: 'Nationals',   abbr: 'WSH', color: '#AB0003', logo: 'https://www.mlbstatic.com/team-logos/120.svg' },
  121: { name: 'Mets',        abbr: 'NYM', color: '#002D72', logo: 'https://www.mlbstatic.com/team-logos/121.svg' },
  133: { name: 'Athletics',   abbr: 'ATH', color: '#003831', logo: 'https://www.mlbstatic.com/team-logos/133.svg' },
  134: { name: 'Pirates',     abbr: 'PIT', color: '#FDB827', logo: 'https://www.mlbstatic.com/team-logos/134.svg' },
  135: { name: 'Padres',      abbr: 'SD',  color: '#2F241D', logo: 'https://www.mlbstatic.com/team-logos/135.svg' },
  136: { name: 'Mariners',    abbr: 'SEA', color: '#0C2C56', logo: 'https://www.mlbstatic.com/team-logos/136.svg' },
  137: { name: 'Giants',      abbr: 'SF',  color: '#FD5A1E', logo: 'https://www.mlbstatic.com/team-logos/137.svg' },
  138: { name: 'Cardinals',   abbr: 'STL', color: '#C41E3A', logo: 'https://www.mlbstatic.com/team-logos/138.svg' },
  139: { name: 'Rays',        abbr: 'TB',  color: '#092C5C', logo: 'https://www.mlbstatic.com/team-logos/139.svg' },
  140: { name: 'Rangers',     abbr: 'TEX', color: '#003278', logo: 'https://www.mlbstatic.com/team-logos/140.svg' },
  141: { name: 'Blue Jays',   abbr: 'TOR', color: '#134A8E', logo: 'https://www.mlbstatic.com/team-logos/141.svg' },
  142: { name: 'Twins',       abbr: 'MIN', color: '#002B5C', logo: 'https://www.mlbstatic.com/team-logos/142.svg' },
  143: { name: 'Phillies',    abbr: 'PHI', color: '#E81828', logo: 'https://www.mlbstatic.com/team-logos/143.svg' },
  144: { name: 'Braves',      abbr: 'ATL', color: '#CE1141', logo: 'https://www.mlbstatic.com/team-logos/144.svg' },
  145: { name: 'White Sox',   abbr: 'CWS', color: '#27251F', logo: 'https://www.mlbstatic.com/team-logos/145.svg' },
  146: { name: 'Marlins',     abbr: 'MIA', color: '#00A3E0', logo: 'https://www.mlbstatic.com/team-logos/146.svg' },
  147: { name: 'Yankees',     abbr: 'NYY', color: '#003087', logo: 'https://www.mlbstatic.com/team-logos/147.svg' },
  158: { name: 'Brewers',     abbr: 'MIL', color: '#12284B', logo: 'https://www.mlbstatic.com/team-logos/158.svg' },
};

let allData = { standings: null, playoffs: null, schedule: null };
let playoffTeamIds = new Set();
let isPlayoffSeason = false;

function fetchWithTimeout(url, ms = 12000) {
  const controller = new AbortController();
  const timer = setTimeout(() => controller.abort(), ms);
  return fetch(url, { signal: controller.signal })
    .finally(() => clearTimeout(timer));
}

async function init() {
  const el = document.getElementById('standingsContent');
  el.innerHTML = `<div class="loading"><div class="spinner"></div><div class="loading-text">LOADING STANDINGS...</div></div>`;
  try {
    await Promise.all([loadStandings(), detectPlayoffs()]);
    renderStandings(); // not awaited — tabs usable immediately
  } catch(e) {
    console.error(e);
    el.innerHTML = `<div class="error-box" style="padding:24px">
      <strong>Error connecting to MLB API</strong><br><br>
      ${e.name === 'AbortError' ? 'Request timed out.' : e.message}<br><br>
      <button onclick="init()" style="margin-top:8px;padding:6px 16px;background:var(--accent);color:#fff;border:none;cursor:pointer;font-family:'Barlow Condensed';font-size:14px;letter-spacing:1px">RETRY</button>
    </div>`;
  }
}

async function detectPlayoffs() {
  try {
    const res = await fetchWithTimeout(`${MLB_API}/schedule/postseason/series?season=${CURRENT_YEAR}&sportId=1`);
    const data = await res.json();
    if (data.series && data.series.length > 0) {
      isPlayoffSeason = true;
      allData.playoffs = data;
      data.series.forEach(s => {
        if (s.series && s.series.teams) {
          s.series.teams.forEach(t => {
            if (t && t.team) playoffTeamIds.add(t.team.id);
          });
        }
      });
      document.getElementById('seasonBadge').textContent = `${CURRENT_YEAR} PLAYOFFS`;
    }
  } catch(e) {}
}

async function loadStandings() {
  const res = await fetchWithTimeout(`${MLB_API}/standings?leagueId=103,104&season=${CURRENT_YEAR}&standingsTypes=regularSeason&hydrate=team,division`);
  if (!res.ok) throw new Error(`MLB API returned ${res.status}`);
  const data = await res.json();
  allData.standings = data.records || [];
}

async function loadGamesRemaining(teamIds) {
  const today = new Date().toISOString().split('T')[0];
  const seasonEnd = `${CURRENT_YEAR}-10-01`;
  try {
    const res = await fetchWithTimeout(`${MLB_API}/schedule?sportId=1&startDate=${today}&endDate=${seasonEnd}&gameType=R`);
    const data = await res.json();
    const counts = {};
    teamIds.forEach(id => counts[id] = 0);
    (data.dates || []).forEach(d => {
      (d.games || []).forEach(g => {
        const a = g.teams.away.team.id, h = g.teams.home.team.id;
        if (counts[a] !== undefined) counts[a]++;
        if (counts[h] !== undefined) counts[h]++;
      });
    });
    return counts;
  } catch(e) { return {}; }
}

async function renderStandings() {
  const el = document.getElementById('standingsContent');
  if (!allData.standings?.length) {
    el.innerHTML = `<div class="error-box" style="padding:24px">
      <strong>No standings data yet for ${CURRENT_YEAR}</strong><br><br>
      The MLB API hasn't published standings for this season yet, or there are no games played.
      <br><br><button onclick="init()" style="margin-top:8px;padding:6px 16px;background:var(--accent);color:#fff;border:none;cursor:pointer;font-family:'Barlow Condensed';font-size:14px;letter-spacing:1px">RETRY</button>
    </div>`;
    return;
  }

  // Render immediately with empty gamesRem, then load in background
  const allTeamIds = [];
  allData.standings.forEach(div => div.teamRecords.forEach(tr => allTeamIds.push(tr.team.id)));
  const gamesRem = {}; // render first with empty, then refresh
  loadGamesRemaining(allTeamIds).then(rem => {
    // update GR badges once loaded without full re-render
    Object.entries(rem).forEach(([tid, gr]) => {
      document.querySelectorAll(`.gr-badge-${tid}`).forEach(el => { el.textContent = `${gr} GR`; el.style.display=''; });
    });
  }).catch(()=>{});

  const leagueWCIds = {};
  [103, 104].forEach(leagueId => {
    const leagueRecs = allData.standings.filter(r => r.league?.id === leagueId);
    let allT = []; const dlIds = new Set();
    leagueRecs.forEach(div => {
      const sorted = [...div.teamRecords].sort((a,b) => b.wins - a.wins);
      if (sorted[0]) dlIds.add(sorted[0].team.id);
      div.teamRecords.forEach(tr => allT.push(tr));
    });
    allT.sort((a,b) => parseFloat(b.winningPercentage) - parseFloat(a.winningPercentage));
    const divWIds = new Set(allT.filter(t => dlIds.has(t.team.id)).slice(0,3).map(t => t.team.id));
    const wc = allT.filter(t => !divWIds.has(t.team.id)).slice(0,3).map(t => t.team.id);
    leagueWCIds[leagueId] = new Set(wc);
  });

  const divMeta = {
    200: { name: 'AL West',    league: 103 },
    201: { name: 'AL East',    league: 103 },
    202: { name: 'AL Central', league: 103 },
    203: { name: 'NL West',    league: 104 },
    204: { name: 'NL East',    league: 104 },
    205: { name: 'NL Central', league: 104 },
  };

  let html = `
    <div class="legend" style="margin-bottom:20px">
      <div class="legend-item"><div class="legend-dot div"></div> División líder</div>
      <div class="legend-item"><div class="legend-dot wc"></div> Wild Card</div>
      <div class="legend-item"><div class="legend-dot out"></div> Eliminado</div>
      <div class="legend-item" style="margin-left:auto; color:var(--muted); font-size:11px">GR = Partidos restantes</div>
    </div>
    <div id="trackerWidget"></div>`;

  const alDivs = allData.standings.filter(r => r.league?.id === 103);
  const nlDivs = allData.standings.filter(r => r.league?.id === 104);
  // Desktop: interleaved AL/NL. Mobile: AL then NL (via CSS order).
  // We render AL first, then NL, and use CSS grid-column to interleave on desktop.
  const orderedDivs = [...alDivs, ...nlDivs];

  html += `
    <div class="divisions-grid" id="divisionsGrid">`;

  let alIdx = 0, nlIdx = 0;
  orderedDivs.forEach((divRecord, di) => {
    const divId = divRecord.division?.id;
    const dm = divMeta[divId];
    if (!dm) return;
    const leagueId = divRecord.league?.id || dm.league;
    const wcIds = leagueWCIds[leagueId] || new Set();

    const teams = [...divRecord.teamRecords].sort((a,b) => b.wins - a.wins);
    const divLeaderId = teams[0]?.team?.id;

    let rows = '';
    teams.forEach((tr, i) => {
      const tid = tr.team.id;
      const meta = TEAM_META[tid] || { name: tr.team.name, abbr: tr.team.abbreviation || '???', logo: `https://www.mlbstatic.com/team-logos/${tid}.svg` };
      // Shorten long names for table compactness
      const displayName = meta.name === 'Diamondbacks' ? 'D-Backs' : meta.name;
      const isDivLeader = tid === divLeaderId;
      const isWC = wcIds.has(tid) && !isDivLeader;
      const isElim = tr.eliminationNumber === 'E' || tr.wildCardEliminationNumber === 'E';
      const rowCls = isElim ? 'elim-row' : isDivLeader ? 'div-leader' : isWC ? 'wc-spot' : '';

      const pct = parseFloat(tr.winningPercentage || 0).toFixed(3).replace(/^0/, '');
      const gb = i === 0 ? `<span class="gb-leader">—</span>` : `<span class="gb-val">${tr.divisionGamesBack}</span>`;
      const gr = gamesRem[tid] !== undefined ? `<span class="games-rem gr-badge-${tid}">${gamesRem[tid]} GR</span>` : `<span class="games-rem gr-badge-${tid}" style="display:none"></span>`;
      const l10 = tr.records?.splitRecords?.find(s => s.type === 'lastTen');
      const l10str = l10 ? `${l10.wins}-${l10.losses}` : '—';
      const l10color = l10 ? (l10.wins > l10.losses ? 'var(--win)' : l10.wins < l10.losses ? 'var(--loss)' : 'var(--text)') : 'var(--muted)';
      const l10html = `<span style="font-family:'Barlow Condensed';font-weight:700;color:${l10color};white-space:nowrap">${l10str}</span>`;

      const streakCode = tr.streak?.streakCode || '—';
      const streakWin = streakCode.startsWith('W');
      const streakColor = streakCode === '—' ? 'var(--muted)' : streakWin ? 'var(--win)' : 'var(--loss)';
      const streakHtml = `<span style="font-family:'Barlow Condensed';font-weight:700;color:${streakColor}">${streakCode}</span>`;

      const mn = tr.magicNumber;
      const mnNum = parseInt(mn);
      let mnHtml = '<span style="color:var(--border)">—</span>';
      if (mn === 'E') {
        mnHtml = `<span style="font-family:'Barlow Condensed';font-size:11px;color:var(--loss);font-weight:700">ELIM</span>`;
      } else if (!isNaN(mnNum) && mnNum <= 50) {
        mnHtml = `<span style="display:inline-block;background:rgba(26,86,219,.1);color:var(--accent);border:1px solid rgba(26,86,219,.25);font-family:'Barlow Condensed';font-size:11px;font-weight:700;padding:1px 6px;min-width:22px;text-align:center">${mnNum}</span>`;
      } else if (!isNaN(mnNum) && mnNum === 0) {
        mnHtml = `<span style="font-family:'Barlow Condensed';font-size:11px;color:var(--win);font-weight:700">CLINCH</span>`;
      }

      let badge = '';
      if (isDivLeader) badge = `<span class="badge-div">DIV</span>`;
      else if (isWC) badge = `<span class="badge-wc">WC</span>`;

      rows += `<tr class="${rowCls}">
        <td>
          <div class="team-cell" style="gap:7px">
            <img class="team-logo-sm" style="width:22px;height:22px" src="https://www.mlbstatic.com/team-logos/${tid}.svg" onerror="this.style.display='none'" alt="">
            <span style="font-weight:500;font-size:14px">${displayName}</span>
            ${gr}
          </div>
        </td>
        <td class="r">${tr.wins}</td>
        <td class="r">${tr.losses}</td>
        <td class="r">${pct}</td>
        <td class="r">${gb}</td>
        <td class="r">${l10html}</td>
        <td class="r">${streakHtml}</td>
        <td class="r">${mnHtml}</td>
        <td>${badge}</td>
      </tr>`;
    });

    // On desktop: AL (league 103) goes in left column, NL in right. On mobile: AL first (natural order).
    const isAL = leagueId === 103;
    const cardOrder = isAL ? (alIdx++) : (3 + nlIdx++); // AL: order 0,1,2 → left col; NL: order 3,4,5 → right col
    html += `<div class="division-card" style="order:${cardOrder}">
      <div class="division-header">
        <span class="division-name">${dm.name}</span>
        <span class="division-league">${isAL ? 'AMERICAN LEAGUE' : 'NATIONAL LEAGUE'}</span>
      </div>
      <table class="div-table">
        <thead><tr>
          <th>TEAM</th><th class="r">W</th><th class="r">L</th>
          <th class="r">PCT</th><th class="r">GB</th>
          <th class="r" style="white-space:nowrap">L10</th><th class="r">STRK</th><th class="r">MN</th><th></th>
        </tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </div>`;
  });

  html += `</div>`;
  el.innerHTML = html;
  // Load tracker in background — don't block standings render
  setTimeout(() => initTracker(), 0);
}

async function initTracker() {
  const wrap = document.getElementById('trackerWidget');
  if (!wrap) return;

  wrap.innerHTML = `<div class="tracker-section">
    <div class="tracker-header">
      <span class="tracker-title">WIN% TRACKER</span>
      <div class="tracker-controls">
        <select class="tracker-select" id="trackerDivSelect" onchange="changeTrackerDiv(this.value)">
          ${Object.entries(TRACKER_DIVISIONS).map(([id,d])=>`<option value="${id}" ${parseInt(id)===trackerCurrentDiv?'selected':''}>${d.name}</option>`).join('')}
        </select>
        <span class="tracker-date-label" id="trackerDateLabel">—</span>
      </div>
    </div>
    <div style="position:relative;user-select:none">
      <canvas id="trackerCanvas" height="240" style="cursor:crosshair"></canvas>
      <div id="trackerOverlay" style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);pointer-events:none">
        <span class="tracker-loading" id="trackerLoadingMsg">CARGANDO DATOS HISTÓRICOS…</span>
      </div>
      <div id="trackerTooltip" style="display:none;position:absolute;background:#fff;border:1px solid var(--border);box-shadow:0 4px 16px rgba(0,0,0,.12);padding:10px 14px;pointer-events:none;min-width:160px;z-index:10;font-size:12px"></div>
    </div>
    <input type="range" class="tracker-slider" id="trackerSlider" min="0" max="0" value="0" oninput="onTrackerSlide(this.value)">
    <div class="tracker-legend-row" id="trackerLegend"></div>
  </div>`;

  setTimeout(() => {
    const canvas = document.getElementById('trackerCanvas');
    if (canvas) {
      canvas.addEventListener('mousemove', onTrackerHover);
      canvas.addEventListener('mouseleave', onTrackerLeave);
    }
  }, 100);

  await loadTrackerData();
}

async function loadTrackerData() {
  const start = new Date(`${CURRENT_YEAR}-03-25`);
  const today = new Date(); today.setHours(0,0,0,0);
  const dates = [];
  let d = new Date(start);
  while (d <= today) {
    dates.push(d.toISOString().split('T')[0]);
    d = new Date(d); d.setDate(d.getDate() + 7);
  }
  const todayStr = today.toISOString().split('T')[0];
  if (dates[dates.length-1] !== todayStr) dates.push(todayStr);
  trackerDates = dates;

  const standingsFetches = dates.map(date =>
    fetchWithTimeout(`${MLB_API}/standings?leagueId=103,104&season=${CURRENT_YEAR}&standingsTypes=regularSeason&hydrate=team,division&date=${date}`)
      .then(r => r.json()).then(data => ({ date, records: data.records || [] })).catch(() => ({ date, records: [] }))
  );

  const scheduleFetches = dates.map(date =>
    fetchWithTimeout(`${MLB_API}/schedule?sportId=1&date=${date}&gameType=R&hydrate=team,linescore`)
      .then(r => r.json()).then(data => ({ date, dates: data.dates || [] })).catch(() => ({ date, dates: [] }))
  );

  const [standingsResults, scheduleResults] = await Promise.all([
    Promise.all(standingsFetches),
    Promise.all(scheduleFetches)
  ]);

  standingsResults.forEach(({date, records}) => { trackerData[date] = records; });

  scheduleResults.forEach(({date, dates: dateDates}) => {
    trackerSchedule[date] = {};
    dateDates.forEach(d => {
      (d.games || []).forEach(g => {
        if (g.status.abstractGameState !== 'Final') return;
        const away = g.teams.away, home = g.teams.home;
        const awayId = away.team.id, homeId = home.team.id;
        const awayScore = away.score ?? 0, homeScore = home.score ?? 0;
        const awayWon = awayScore > homeScore;
        const awayMeta = TEAM_META[homeId] || { abbr: '???' };
        const homeMeta = TEAM_META[awayId] || { abbr: '???' };
        trackerSchedule[date][awayId] = {
          result: awayWon ? 'W' : 'L',
          score: `${awayScore}-${homeScore}`,
          vs: `vs ${awayMeta.abbr}`
        };
        trackerSchedule[date][homeId] = {
          result: !awayWon ? 'W' : 'L',
          score: `${homeScore}-${awayScore}`,
          vs: `vs ${homeMeta.abbr}`
        };
      });
    });
  });

  trackerLoaded = true;
  const slider = document.getElementById('trackerSlider');
  if (slider) { slider.max = dates.length - 1; slider.value = dates.length - 1; }
  const loadMsg = document.getElementById('trackerLoadingMsg');
  if (loadMsg) loadMsg.style.display = 'none';
  drawTracker(trackerDates.length - 1);
}

function changeTrackerDiv(divId) {
  trackerCurrentDiv = parseInt(divId);
  trackerHoverIdx = null;
  const slider = document.getElementById('trackerSlider');
  if (slider) drawTracker(parseInt(slider.value));
}

function onTrackerSlide(val) {
  trackerHoverIdx = null;
  drawTracker(parseInt(val));
}

function onTrackerHover(e) {
  const canvas = document.getElementById('trackerCanvas');
  if (!canvas || !trackerLoaded) return;
  const rect = canvas.getBoundingClientRect();
  const mx = e.clientX - rect.left;
  const slider = document.getElementById('trackerSlider');
  const sliderIdx = slider ? parseInt(slider.value) : trackerDates.length - 1;
  const visibleDates = trackerDates.slice(0, sliderIdx + 1);
  const PAD = { top: 20, right: 72, bottom: 28, left: 50 };
  const W = canvas.offsetWidth;
  const cW = W - PAD.left - PAD.right;
  const relX = mx - PAD.left;
  if (relX < 0 || relX > cW) { onTrackerLeave(); return; }
  const idx = Math.round((relX / cW) * Math.max(visibleDates.length - 1, 1));
  const clampedIdx = Math.max(0, Math.min(idx, visibleDates.length - 1));
  if (trackerHoverIdx === clampedIdx) return;
  trackerHoverIdx = clampedIdx;
  drawTracker(sliderIdx);
  showTrackerTooltip(clampedIdx, visibleDates, e.clientX - rect.left, canvas);
}

function onTrackerLeave() {
  trackerHoverIdx = null;
  const tooltip = document.getElementById('trackerTooltip');
  if (tooltip) tooltip.style.display = 'none';
  const slider = document.getElementById('trackerSlider');
  if (slider) drawTracker(parseInt(slider.value));
}

function showTrackerTooltip(idx, visibleDates, mouseX, canvas) {
  const tooltip = document.getElementById('trackerTooltip');
  if (!tooltip) return;
  const date = visibleDates[idx];
  const recs = trackerData[date] || [];
  const dr = recs.find(r => r.division?.id === trackerCurrentDiv);
  if (!dr) return;

  const sorted = [...dr.teamRecords].sort((a,b) => b.wins - a.wins);
  const d = new Date(date + 'T12:00:00');
  const dateStr = d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });

  let rows = sorted.map(tr => {
    const tid = tr.team.id;
    const meta = TEAM_META[tid] || { abbr: '???' };
    const color = TEAM_COLORS_TRACKER[tid] || '#999';
    const pct = parseFloat(tr.winningPercentage || 0).toFixed(3).replace(/^0/, '');
    return `<div style="display:flex;align-items:center;gap:8px;padding:3px 0;border-bottom:1px solid #f3f4f6">
      <div style="width:8px;height:8px;border-radius:50%;background:${color};flex-shrink:0"></div>
      <span style="font-family:'Barlow Condensed';font-weight:700;color:${color};width:28px">${meta.abbr}</span>
      <span style="font-family:'Barlow Condensed';color:#6b7280;width:40px">${tr.wins}-${tr.losses}</span>
      <span style="font-family:'Barlow Condensed';font-weight:700;color:#111827">${pct}</span>
    </div>`;
  }).join('');

  tooltip.innerHTML = `
    <div style="font-family:'Bebas Neue';font-size:13px;letter-spacing:1.5px;color:#6b7280;margin-bottom:6px">${dateStr}</div>
    ${rows}`;
  tooltip.style.display = 'block';

  const tipW = 240;
  let left = mouseX + 12;
  if (left + tipW > canvas.offsetWidth) left = mouseX - tipW - 12;
  tooltip.style.left = left + 'px';
  tooltip.style.top = '10px';
}

function drawTracker(sliderIdx) {
  const canvas = document.getElementById('trackerCanvas');
  if (!canvas || !trackerLoaded || !trackerDates.length) return;

  const visibleDates = trackerDates.slice(0, sliderIdx + 1);
  const dateLabel = document.getElementById('trackerDateLabel');
  if (dateLabel) {
    const d = new Date(visibleDates[visibleDates.length - 1] + 'T12:00:00');
    dateLabel.textContent = d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
  }

  const latestRec = trackerData[trackerDates[sliderIdx]] || [];
  const divRec = latestRec.find(r => r.division?.id === trackerCurrentDiv);
  if (!divRec) return;
  const divTeams = divRec.teamRecords.map(t => t.team.id);

  const series = {};
  divTeams.forEach(id => series[id] = []);
  visibleDates.forEach(date => {
    const recs = trackerData[date] || [];
    const dr = recs.find(r => r.division?.id === trackerCurrentDiv);
    const seen = new Set();
    if (dr) {
      dr.teamRecords.forEach(tr => {
        if (series[tr.team.id]) {
          series[tr.team.id].push(parseFloat(tr.winningPercentage) || 0);
          seen.add(tr.team.id);
        }
      });
    }
    divTeams.forEach(id => { if (!seen.has(id)) series[id].push(null); });
  });

  const dpr = window.devicePixelRatio || 1;
  const W = canvas.offsetWidth || canvas.parentElement?.offsetWidth || 600;
  const H = 240;
  canvas.width = W * dpr;
  canvas.height = H * dpr;
  const ctx = canvas.getContext('2d');
  ctx.scale(dpr, dpr);

  const PAD = { top: 20, right: 72, bottom: 28, left: 50 };
  const cW = W - PAD.left - PAD.right;
  const cH = H - PAD.top - PAD.bottom;

  let minPct = .350, maxPct = .750;
  Object.values(series).forEach(arr => arr.forEach(v => {
    if (v != null) { minPct = Math.min(minPct, v); maxPct = Math.max(maxPct, v); }
  }));
  minPct = Math.max(0, Math.floor(minPct * 10) / 10 - 0.05);
  maxPct = Math.min(1, Math.ceil(maxPct * 10) / 10 + 0.05);
  const pctRange = maxPct - minPct;

  const yFor = pct => PAD.top + cH - ((pct - minPct) / pctRange) * cH;
  const xFor = (i, total) => PAD.left + (i / Math.max(total - 1, 1)) * cW;

  ctx.fillStyle = '#ffffff';
  ctx.fillRect(0, 0, W, H);

  ctx.font = '10px Barlow Condensed, sans-serif';
  ctx.textAlign = 'right';
  const gridPcts = [];
  for (let p = Math.ceil(minPct * 10) / 10; p <= maxPct + 0.001; p = Math.round((p + 0.1) * 10) / 10) gridPcts.push(p);
  gridPcts.forEach(p => {
    const y = yFor(p);
    const is500 = Math.abs(p - 0.5) < 0.001;
    ctx.strokeStyle = is500 ? 'rgba(107,114,128,.4)' : '#f0f0f0';
    ctx.lineWidth = is500 ? 1.5 : 1;
    ctx.setLineDash(is500 ? [4,3] : []);
    ctx.beginPath(); ctx.moveTo(PAD.left, y); ctx.lineTo(PAD.left + cW, y); ctx.stroke();
    ctx.setLineDash([]);
    ctx.fillStyle = is500 ? '#6b7280' : '#c0c0c0';
    ctx.fillText(p.toFixed(3).replace(/^0/,''), PAD.left - 5, y + 3.5);
  });

  ctx.fillStyle = '#aaa';
  ctx.textAlign = 'center';
  const labelStep = Math.max(1, Math.floor(visibleDates.length / 5));
  visibleDates.forEach((date, i) => {
    if (i % labelStep !== 0 && i !== visibleDates.length - 1) return;
    const x = xFor(i, visibleDates.length);
    const dd = new Date(date + 'T12:00:00');
    ctx.fillText(dd.toLocaleDateString('en-US', { month: 'short', day: 'numeric' }), x, H - 7);
  });

  const currentPcts = {};
  divTeams.forEach(id => {
    const arr = series[id];
    const last = [...arr].reverse().find(v => v != null);
    currentPcts[id] = last ?? 0;
  });
  const sortedTeams = [...divTeams].sort((a,b) => currentPcts[b] - currentPcts[a]);

  function buildPath(vals, total) {
    const pts = [];
    vals.forEach((v, i) => { if (v != null) pts.push({ x: xFor(i, total), y: yFor(v), i }); });
    return pts;
  }
  function drawSmooth(ctx, pts) {
    if (!pts.length) return;
    ctx.moveTo(pts[0].x, pts[0].y);
    for (let i = 1; i < pts.length; i++) {
      const prev = pts[i-1], curr = pts[i];
      const cpx = (prev.x + curr.x) / 2;
      ctx.bezierCurveTo(cpx, prev.y, cpx, curr.y, curr.x, curr.y);
    }
  }

  sortedTeams.forEach((tid) => {
    const vals = series[tid];
    const pts = buildPath(vals, visibleDates.length);
    if (pts.length < 2) return;
    const color = TEAM_COLORS_TRACKER[tid] || '#999';

    ctx.beginPath();
    drawSmooth(ctx, pts);
    ctx.lineTo(pts[pts.length-1].x, PAD.top + cH);
    ctx.lineTo(pts[0].x, PAD.top + cH);
    ctx.closePath();
    const grad = ctx.createLinearGradient(0, PAD.top, 0, PAD.top + cH);
    grad.addColorStop(0, color + '22');
    grad.addColorStop(1, color + '00');
    ctx.fillStyle = grad;
    ctx.fill();
  });

  sortedTeams.forEach((tid, rank) => {
    const vals = series[tid];
    const pts = buildPath(vals, visibleDates.length);
    if (!pts.length) return;
    const color = TEAM_COLORS_TRACKER[tid] || '#999';
    const isTop = rank === 0;

    ctx.strokeStyle = color;
    ctx.lineWidth = isTop ? 2.2 : 1.6;
    ctx.lineJoin = 'round'; ctx.lineCap = 'round';
    ctx.beginPath();
    drawSmooth(ctx, pts);
    ctx.stroke();

    const lastPt = pts[pts.length-1];
    ctx.beginPath(); ctx.arc(lastPt.x, lastPt.y, isTop ? 4 : 3, 0, Math.PI * 2);
    ctx.fillStyle = color; ctx.fill();
    ctx.strokeStyle = '#fff'; ctx.lineWidth = 1.5; ctx.stroke();
  });

  if (trackerHoverIdx !== null && trackerHoverIdx < visibleDates.length) {
    const hx = xFor(trackerHoverIdx, visibleDates.length);
    ctx.strokeStyle = 'rgba(107,114,128,.4)';
    ctx.lineWidth = 1;
    ctx.setLineDash([3,3]);
    ctx.beginPath(); ctx.moveTo(hx, PAD.top); ctx.lineTo(hx, PAD.top + cH); ctx.stroke();
    ctx.setLineDash([]);

    sortedTeams.forEach(tid => {
      const v = series[tid][trackerHoverIdx];
      if (v == null) return;
      const color = TEAM_COLORS_TRACKER[tid] || '#999';
      ctx.beginPath(); ctx.arc(hx, yFor(v), 4, 0, Math.PI * 2);
      ctx.fillStyle = '#fff'; ctx.fill();
      ctx.strokeStyle = color; ctx.lineWidth = 2; ctx.stroke();
    });
  }

  ctx.textAlign = 'left';
  const labelY = sortedTeams.map(tid => {
    const v = currentPcts[tid];
    return v ? yFor(v) : null;
  });
  const minGap = 13;
  for (let i = 1; i < labelY.length; i++) {
    if (labelY[i] !== null && labelY[i-1] !== null && labelY[i] - labelY[i-1] < minGap) {
      labelY[i] = labelY[i-1] + minGap;
    }
  }
  sortedTeams.forEach((tid, i) => {
    if (labelY[i] === null) return;
    const meta = TEAM_META[tid] || { abbr: '???' };
    ctx.font = 'bold 11px Barlow Condensed, sans-serif';
    ctx.fillStyle = TEAM_COLORS_TRACKER[tid] || '#999';
    ctx.fillText(meta.abbr, PAD.left + cW + 5, labelY[i] + 4);
  });

  const legendEl = document.getElementById('trackerLegend');
  if (legendEl) {
    legendEl.innerHTML = sortedTeams.map(tid => {
      const meta = TEAM_META[tid] || { abbr: '???' };
      const color = TEAM_COLORS_TRACKER[tid] || '#999';
      const pct = currentPcts[tid].toFixed(3).replace(/^0/,'');
      const recs = trackerData[trackerDates[sliderIdx]] || [];
      const dr = recs.find(r => r.division?.id === trackerCurrentDiv);
      const tr = dr?.teamRecords?.find(t => t.team.id === tid);
      const wl = tr ? `${tr.wins}-${tr.losses}` : '';
      return `<div class="tracker-legend-item">
        <div class="tracker-legend-dot" style="background:${color}"></div>
        <strong style="color:var(--text)">${meta.abbr}</strong>
        <span style="color:var(--muted)">${wl}</span>
        <span style="color:var(--text);font-weight:600">${pct}</span>
      </div>`;
    }).join('');
  }
}

async function loadBracket() {
  const el = document.getElementById('bracketContent');
  try {
    if (!isPlayoffSeason) {
      el.innerHTML = renderProjectedBracket();
      return;
    }
    el.innerHTML = renderPlayoffBracket(allData.playoffs);
  } catch(e) {
    el.innerHTML = `<div class="error-box">Bracket unavailable: ${e.message}</div>`;
  }
}

function renderProjectedBracket() {
  if (!allData.standings) return '<div class="error-box">No data available.</div>';

  const getSeeds = (records) => {
    let all = []; const divLeaderIds = new Set();
    records.forEach(div => {
      const sorted = div.teamRecords.slice().sort((a,b) => {
        const pa = parseFloat(a.winningPercentage)||0, pb = parseFloat(b.winningPercentage)||0;
        return pb - pa;
      });
      if (sorted[0]) divLeaderIds.add(sorted[0].team.id);
      div.teamRecords.forEach(tr => all.push(tr));
    });
    const divLeaders = all
      .filter(t => divLeaderIds.has(t.team.id))
      .sort((a,b) => parseFloat(b.winningPercentage) - parseFloat(a.winningPercentage))
      .slice(0,3);
    const wc = all
      .filter(t => !divLeaderIds.has(t.team.id))
      .sort((a,b) => parseFloat(b.winningPercentage) - parseFloat(a.winningPercentage))
      .slice(0,3);
    return [...divLeaders, ...wc];
  };

  const al = allData.standings.filter(r => r.league?.id === 103);
  const nl = allData.standings.filter(r => r.league?.id === 104);

  const renderBracket = (seeds, leagueLabel) => {
    const seedCard = (t, seed) => {
      if (!t) return `<div style="display:flex;align-items:center;gap:5px;padding:5px 8px;background:var(--surface2);border-radius:4px;opacity:.55"><span style="font-family:'Barlow Condensed';font-weight:800;font-size:11px;color:var(--muted);width:14px">${seed}</span><span style="font-family:'Barlow Condensed';font-size:12px;color:var(--muted)">TBD</span></div>`;
      const meta = TEAM_META[t.team.id] || { name: t.team.name, abbr: t.team.abbreviation||'???' };
      const abbr = meta.abbr || meta.name.slice(0,3).toUpperCase();
      const isDivW = typeof seed === 'number' && seed <= 3;
      const badge = isDivW
        ? `<span style="font-size:8px;font-weight:700;padding:1px 3px;background:rgba(22,163,74,.12);color:var(--win);border-radius:2px">D</span>`
        : `<span style="font-size:8px;font-weight:700;padding:1px 3px;background:rgba(26,86,219,.1);color:var(--accent);border-radius:2px">WC</span>`;
      return `<div style="display:flex;align-items:center;gap:5px;padding:5px 8px;background:var(--bg);border-radius:4px;">
        <span style="font-family:'Barlow Condensed';font-weight:800;font-size:11px;color:var(--muted);width:14px">${seed}</span>
        <img src="https://www.mlbstatic.com/team-logos/${t.team.id}.svg" style="width:18px;height:18px;object-fit:contain" onerror="this.style.display='none'" alt="">
        <span style="font-family:'Barlow Condensed';font-weight:700;font-size:13px;flex:1">${abbr}</span>
        <span style="font-size:10px;color:var(--muted)">${t.wins}-${t.losses}</span>
        ${badge}
      </div>`;
    };
    const vs = `<div style="font-family:'Barlow Condensed';font-size:9px;color:var(--muted);text-align:center;padding:1px 0">VS</div>`;
    const box = (a, sa, b, sb) => `<div style="background:var(--surface);border:1px solid var(--border);border-radius:5px;overflow:hidden;margin-bottom:6px">${seedCard(a,sa)}${vs}${seedCard(b,sb)}</div>`;

    const rest = all.filter(t => !divLeaderIds.has(t.team.id)).sort((a,b) => parseFloat(b.winningPercentage)-parseFloat(a.winningPercentage));

    const wcIds = new Set(ordered.slice(3,6).map(t => t.team.id));
    let rows = '';
    ordered.forEach((t, i) => {
      const meta = TEAM_META[t.team.id] || { name: t.team.name, abbr:'???' };
      const displayName = meta.name === 'Diamondbacks' ? 'D-Backs' : meta.name;
      const isDivW = divLeaderIds.has(t.team.id);
      const isWC = wcIds.has(t.team.id);
      const isElim = t.eliminationNumber === 'E' || t.wildCardEliminationNumber === 'E';
      const rc = isElim ? 'xr' : isDivW ? 'dr' : isWC ? 'wr' : '';
      const pct = parseFloat(t.winningPercentage||0).toFixed(3).replace(/^0/,'');
      const wcgb = parseFloat(t.wildCardGamesBack);
      let wcgbStr;
      if (isNaN(wcgb) || wcgb < 0) { wcgbStr = (isDivW || isWC) ? '—' : '—'; }
      else if (wcgb === 0) { wcgbStr = '—'; }
      else { wcgbStr = `${wcgb}`; }
      const l10 = t.records?.splitRecords?.find(s=>s.type==='lastTen');
      const l10w = l10?.wins ?? 0, l10l = l10?.losses ?? 0;
      const l10color = l10w > l10l ? 'var(--win)' : l10w < l10l ? 'var(--loss)' : 'var(--text)';
      const badge = isDivW ? '<span class="badge-div">DIV</span>' : isWC ? '<span class="badge-wc">WC</span>' : '';
      rows += `<tr class="${rc}">
        <td style="width:28px;font-family:'Barlow Condensed';font-weight:700;color:var(--muted);font-size:13px">${i+1}</td>
        <td><div class="team-cell" style="gap:7px">

          <span style="font-weight:500;font-size:14px">${displayName}</span>
